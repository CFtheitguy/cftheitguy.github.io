<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client Portal - Linear Tech</title>

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/handsontable/dist/handsontable.full.min.css"
  />
  <script src="https://cdn.jsdelivr.net/npm/handsontable/dist/handsontable.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    * { box-sizing: border-box; }

    :root{
      --bg1:#0f172a;
      --bg2:#162033;
      --bg3:#1e293b;
      --panel:rgba(255,255,255,0.96);
      --panel-border:rgba(255,255,255,0.26);
      --text:#1f2937;
      --muted:#6b7280;
      --brand1:#1f3b57;
      --brand2:#2b4c6f;
      --brand3:#355d87;
      --line:#e5e7eb;
      --green:#1f8f5f;
      --green2:#16734d;
      --blue:#2c5aa0;
      --blue2:#23477f;
      --shadow:0 25px 70px rgba(0,0,0,.35);
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      min-height: 100vh;
      padding: 28px;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,.16), transparent 38%),
        radial-gradient(circle at bottom right, rgba(30,64,175,.15), transparent 40%),
        linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 40%, var(--bg3) 100%);
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: linear-gradient(to bottom, rgba(255,255,255,.02), rgba(0,0,0,.18));
      pointer-events: none;
    }

    .bg-floaters {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .floater {
      position: absolute;
      border-radius: 28px;
      background: linear-gradient(135deg, rgba(255,255,255,.045), rgba(255,255,255,.015));
      border: 1px solid rgba(255,255,255,.06);
      box-shadow: 0 20px 50px rgba(0,0,0,.18);
      animation: float 14s ease-in-out infinite;
    }

    .f1 { width: 140px; height: 140px; top: 70px; left: 80px; }
    .f2 { width: 80px; height: 80px; top: 210px; right: 120px; animation-delay: -2s; }
    .f3 { width: 200px; height: 200px; bottom: 55px; left: 65px; animation-delay: -4s; }
    .f4 { width: 120px; height: 120px; bottom: 70px; right: 90px; animation-delay: -1s; }

    @keyframes float {
      0%,100% { transform: translateY(0px); }
      50% { transform: translateY(-18px); }
    }

    .shell {
      max-width: 1180px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }

    .content-box {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 24px;
      padding: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .header-box {
      background: linear-gradient(135deg, #16263a, #1f3b57 55%, #2c4a68);
      color: white;
      padding: 24px;
      border-radius: 18px;
      margin-bottom: 22px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.05);
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .header-box h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 40px);
      line-height: 1.1;
      letter-spacing: -.02em;
    }

    .header-box p {
      margin: 8px 0 0;
      color: rgba(255,255,255,.88);
      font-size: 15px;
    }

    .badge {
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.15);
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 13px;
      white-space: nowrap;
    }

    .folder {
      margin: 16px 0;
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 8px 24px rgba(15, 23, 42, .05);
    }

    .folder-header {
      background: linear-gradient(135deg, var(--brand1), var(--brand2));
      color: white;
      padding: 16px 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      transition: .2s ease;
    }

    .folder-header:hover {
      background: linear-gradient(135deg, #27496b, var(--brand3));
    }

    .folder-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .folder-icon {
      font-size: 22px;
      line-height: 1;
    }

    .folder-name {
      font-size: 18px;
      font-weight: 700;
    }

    .folder-count {
      font-size: 13px;
      opacity: .86;
    }

    .folder-arrow {
      font-size: 18px;
      transition: transform .25s ease;
      flex-shrink: 0;
    }

    .folder.open .folder-arrow {
      transform: rotate(90deg);
    }

    .folder-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height .28s ease;
      background: #f8fafc;
    }

    .folder.open .folder-content {
      max-height: 1400px;
      overflow-y: auto;
    }

    .file-list {
      padding: 10px;
    }

    .file-item {
      background: white;
      border: 1px solid #e8edf3;
      border-left: 5px solid #4f7ecb;
      border-radius: 12px;
      padding: 14px 16px;
      margin: 10px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      transition: transform .18s ease, box-shadow .18s ease;
    }

    .file-item:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(15,23,42,.08);
    }

    .file-info {
      min-width: 0;
      flex: 1;
    }

    .file-name {
      font-weight: 700;
      color: #1f2937;
      word-break: break-word;
      margin-bottom: 4px;
    }

    .file-sub {
      font-size: 13px;
      color: var(--muted);
    }

    .file-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
      flex-shrink: 0;
    }

    .btn {
      text-decoration: none;
      padding: 9px 14px;
      border-radius: 10px;
      color: white;
      font-size: 14px;
      font-weight: 700;
      display: inline-block;
      transition: .18s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-view {
      background: linear-gradient(135deg, var(--green), #22a06b);
    }

    .btn-view:hover {
      background: linear-gradient(135deg, var(--green2), #19885a);
    }

    .btn-download {
      background: linear-gradient(135deg, var(--blue), #3a6fc0);
    }

    .btn-download:hover {
      background: linear-gradient(135deg, var(--blue2), #2f5fa7);
    }

    .empty-folder {
      padding: 30px 18px;
      text-align: center;
      color: #94a3b8;
      font-style: italic;
    }

    .footer-note {
      margin-top: 18px;
      font-size: 13px;
      color: #94a3b8;
      text-align: center;
    }

    .ticket-sheet-wrap {
      padding: 14px;
    }

    .ticket-status {
      font-size: 14px;
      color: #475569;
      margin-bottom: 12px;
    }

    .ticket-toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .ticket-toolbar a {
      text-decoration: none;
    }

    .sheet-box {
      background: #fff;
      border: 1px solid #dbe3ee;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.8);
    }

    #ticketsSpreadsheet {
      width: 100%;
      height: 70vh;
      min-height: 520px;
    }

    @media (max-width: 700px) {
      body { padding: 14px; }
      .content-box { padding: 16px; border-radius: 18px; }
      .header-box { padding: 18px; }
      .file-item {
        flex-direction: column;
        align-items: flex-start;
      }
      .file-actions {
        width: 100%;
        justify-content: flex-start;
      }
      .btn {
        width: auto;
      }
      #ticketsSpreadsheet {
        height: 60vh;
        min-height: 420px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-floaters">
    <span class="floater f1"></span>
    <span class="floater f2"></span>
    <span class="floater f3"></span>
    <span class="floater f4"></span>
  </div>

  <div class="shell">
    <div class="content-box">
      <div class="header-box">
        <div class="header-top">
          <div>
            <h1>Welcome to Your Portal! 👋</h1>
            <p>Access your invoices, tickets, and documents.</p>
          </div>
          <div class="badge">Linear Tech Secure Portal</div>
        </div>
      </div>

      <div class="folder open" id="invoicesFolder">
        <div class="folder-header" onclick="toggleFolder('invoicesFolder')">
          <div class="folder-left">
            <span class="folder-icon">📄</span>
            <div>
              <div class="folder-name">Invoices</div>
              <div class="folder-count" id="invoicesCount">Loading...</div>
            </div>
          </div>
          <span class="folder-arrow">▶</span>
        </div>
        <div class="folder-content">
          <div class="file-list" id="invoicesList"></div>
        </div>
      </div>

      <div class="folder" id="ticketsFolder">
        <div class="folder-header" onclick="toggleFolder('ticketsFolder')">
          <div class="folder-left">
            <span class="folder-icon">🎫</span>
            <div>
              <div class="folder-name">Support Tickets</div>
              <div class="folder-count" id="ticketsCount">Loading...</div>
            </div>
          </div>
          <span class="folder-arrow">▶</span>
        </div>
        <div class="folder-content">
          <div class="ticket-sheet-wrap">
            <div class="ticket-status" id="ticketsStatus">Loading ticket sheet...</div>

            <div class="ticket-toolbar">
              <a href="/revenueeagle/assets/tickets/CRM.xlsx" class="btn btn-view" target="_blank" rel="noopener">Open Excel File</a>
              <a href="/revenueeagle/assets/tickets/CRM.xlsx" class="btn btn-download" download>Download Excel</a>
            </div>

            <div class="sheet-box">
              <div id="ticketsSpreadsheet"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="folder" id="documentsFolder">
        <div class="folder-header" onclick="toggleFolder('documentsFolder')">
          <div class="folder-left">
            <span class="folder-icon">📁</span>
            <div>
              <div class="folder-name">Documents</div>
              <div class="folder-count" id="documentsCount">Loading...</div>
            </div>
          </div>
          <span class="folder-arrow">▶</span>
        </div>
        <div class="folder-content">
          <div class="file-list" id="documentsList"></div>
        </div>
      </div>

      <div class="footer-note">
        Need help? Contact Linear Tech for support.
      </div>
    </div>
  </div>

  <script>
    const CLIENT_BASE = "/revenueeagle";
    const INVOICES_JSON = `${CLIENT_BASE}/assets/invoices/invoices.json`;
    const DOCUMENTS_JSON = `${CLIENT_BASE}/assets/documents/documents.json`;
    const TICKETS_XLSX = `${CLIENT_BASE}/assets/tickets/CRM.xlsx`;

    let invoices = [];
    let documents = [];
    let ticketsSheetLoaded = false;
    let ticketsHot = null;

    async function loadInvoiceFiles() {
      try {
        const res = await fetch(INVOICES_JSON, { cache: "no-store" });
        if (!res.ok) {
          invoices = [];
          return;
        }

        const data = await res.json();
        invoices = Array.isArray(data)
          ? data.filter(x => typeof x === "string" && x.toLowerCase().endsWith(".pdf"))
          : [];
      } catch (err) {
        console.error("Could not load invoices.json", err);
        invoices = [];
      }
    }

    async function loadDocumentFiles() {
      try {
        const res = await fetch(DOCUMENTS_JSON, { cache: "no-store" });
        if (!res.ok) {
          documents = [];
          return;
        }

        const data = await res.json();
        documents = Array.isArray(data)
          ? data.filter(x => typeof x === "string")
          : [];
      } catch (err) {
        console.error("Could not load documents.json", err);
        documents = [];
      }
    }

    function escapeHtml(str) {
      return str
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function prettyName(filename) {
      return filename
        .replace(/\.[^.]+$/i, "")
        .replace(/[-_]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function createFileItem(filename, folder) {
      const safeDisplay = escapeHtml(prettyName(filename));
      const extension = filename.includes(".")
        ? filename.split(".").pop().toUpperCase()
        : "FILE";
      const safePath = `${CLIENT_BASE}/assets/${folder}/${encodeURIComponent(filename)}`;

      return `
        <div class="file-item">
          <div class="file-info">
            <div class="file-name">${safeDisplay}</div>
            <div class="file-sub">${extension} file</div>
          </div>
          <div class="file-actions">
            <a href="${safePath}" class="btn btn-view" target="_blank" rel="noopener">View</a>
            <a href="${safePath}" class="btn btn-download" download>Download</a>
          </div>
        </div>
      `;
    }

    function setCount(id, count, label) {
      document.getElementById(id).textContent = `${count} ${count === 1 ? label : label + "s"}`;
    }

    function loadFiles() {
      const invoicesList = document.getElementById("invoicesList");
      const documentsList = document.getElementById("documentsList");

      const sortedInvoices = [...invoices].sort().reverse();
      const sortedDocuments = [...documents].sort().reverse();

      invoicesList.innerHTML = sortedInvoices.length
        ? sortedInvoices.map(f => createFileItem(f, "invoices")).join("")
        : '<div class="empty-folder">No invoices available</div>';

      documentsList.innerHTML = sortedDocuments.length
        ? sortedDocuments.map(f => createFileItem(f, "documents")).join("")
        : '<div class="empty-folder">No documents available</div>';

      setCount("invoicesCount", sortedInvoices.length, "file");
      setCount("documentsCount", sortedDocuments.length, "file");
    }

    async function loadTicketsSpreadsheet() {
      if (ticketsSheetLoaded) return;

      const status = document.getElementById("ticketsStatus");
      const container = document.getElementById("ticketsSpreadsheet");

      try {
        const response = await fetch(TICKETS_XLSX, { cache: "no-store" });
        if (!response.ok) {
          throw new Error("Could not load CRM.xlsx");
        }

        const arrayBuffer = await response.arrayBuffer();
        const workbook = XLSX.read(arrayBuffer, { type: "array" });

        const firstSheetName = workbook.SheetNames[0];
        const worksheet = workbook.Sheets[firstSheetName];

        const data = XLSX.utils.sheet_to_json(worksheet, {
          header: 1,
          defval: ""
        });

        if (!data.length) {
          status.textContent = "No rows found in the Excel sheet.";
          setCount("ticketsCount", 0, "ticket");
          return;
        }

        ticketsHot = new Handsontable(container, {
          data: data,
          rowHeaders: true,
          colHeaders: true,
          readOnly: true,
          licenseKey: "non-commercial-and-evaluation",
          width: "100%",
          height: "100%",
          stretchH: "all",
          manualColumnResize: true,
          manualRowResize: true,
          filters: true,
          dropdownMenu: true,
          contextMenu: true
        });

        const rowCount = Math.max(data.length - 1, 0);
        status.textContent = `Loaded sheet: ${firstSheetName}`;
        setCount("ticketsCount", rowCount, "ticket");
        ticketsSheetLoaded = true;
      } catch (error) {
        console.error(error);
        status.textContent = "Error loading ticket sheet: " + error.message;
        setCount("ticketsCount", 0, "ticket");
      }
    }

    function toggleFolder(folderId) {
      const folder = document.getElementById(folderId);
      const isOpening = !folder.classList.contains("open");

      folder.classList.toggle("open");

      if (folderId === "ticketsFolder" && isOpening) {
        loadTicketsSpreadsheet();
      }
    }

    Promise.all([loadInvoiceFiles(), loadDocumentFiles()]).then(loadFiles);
    setCount("ticketsCount", 0, "ticket");
  </script>
</body>
</html>
