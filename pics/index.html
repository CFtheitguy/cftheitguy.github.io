<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pictures - Linear Tech</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1220;
      color: #fff;
      padding: 30px;
    }

    h1 {
      margin-top: 0;
      font-size: 2rem;
    }

    p {
      color: #b8c2d6;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background: #111a2b;
      border: 1px solid #22314d;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }

    .card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
      background: #0f172a;
    }

    .card .info {
      padding: 12px;
    }

    .card a {
      color: #7dd3fc;
      text-decoration: none;
      word-break: break-all;
      font-size: 0.95rem;
    }

    .card a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>Pictures</h1>
  <p>All images in this folder.</p>

  <div class="gallery" id="gallery"></div>

  <script>
    const images = [
      "pic1.jpg",
      "pic2.jpg",
      "pic3.jpeg",
      "pic4.png",
      "pic5.webp"
    ];

    const gallery = document.getElementById("gallery");

    images.forEach(file => {
      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <a href="${file}" target="_blank">
          <img src="${file}" alt="${file}">
        </a>
        <div class="info">
          <a href="${file}" target="_blank">${file}</a>
        </div>
      `;

      gallery.appendChild(card);
    });
  </script>
</body>
</html>
