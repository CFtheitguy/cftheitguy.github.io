<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pictures</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,0.18), transparent 30%),
        radial-gradient(circle at top right, rgba(249,115,22,0.14), transparent 28%),
        linear-gradient(180deg, #08111f 0%, #0b1628 100%);
      color: #fff;
      min-height: 100vh;
      padding: 28px;
    }

    .wrap {
      max-width: 1400px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
      font-weight: 700;
    }

    .sub {
      color: #b8c7dd;
      margin-bottom: 24px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 18px;
    }

    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      overflow: hidden;
      backdrop-filter: blur(8px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.28);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 18px 38px rgba(0,0,0,0.34);
    }

    .card a {
      display: block;
      text-decoration: none;
    }

    .card img {
      display: block;
      width: 100%;
      height: 260px;
      object-fit: cover;
      background: #0f172a;
    }

    .msg {
      padding: 18px;
      border-radius: 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: #dbe6f5;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 9999;
    }

    .lightbox.open {
      display: flex;
    }

    .lightbox img {
      max-width: 95vw;
      max-height: 92vh;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .close {
      position: fixed;
      top: 18px;
      right: 22px;
      width: 42px;
      height: 42px;
      border: 0;
      border-radius: 999px;
      background: rgba(255,255,255,0.14);
      color: white;
      font-size: 24px;
      cursor: pointer;
    }

    @media (max-width: 640px) {
      body { padding: 16px; }
      .card img { height: 200px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Pictures</h1>
    <div class="sub">All images in this folder load automatically.</div>
    <div id="gallery" class="gallery"></div>
    <div id="status" class="msg" style="display:none;"></div>
  </div>

  <div id="lightbox" class="lightbox">
    <button class="close" id="closeBtn">&times;</button>
    <img id="lightboxImg" src="" alt="">
  </div>

  <script>
    const owner = "CFtheitguy";
    const repo = "cftheitguy.github.io";
    const branch = "main";
    const folder = "pics";

    const gallery = document.getElementById("gallery");
    const statusBox = document.getElementById("status");
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightboxImg");
    const closeBtn = document.getElementById("closeBtn");

    function showMessage(msg) {
      statusBox.style.display = "block";
      statusBox.textContent = msg;
    }

    function openLightbox(src) {
      lightboxImg.src = src;
      lightbox.classList.add("open");
    }

    function closeLightbox() {
      lightbox.classList.remove("open");
      lightboxImg.src = "";
    }

    closeBtn.addEventListener("click", closeLightbox);
    lightbox.addEventListener("click", (e) => {
      if (e.target === lightbox) closeLightbox();
    });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeLightbox();
    });

    async function loadImages() {
      try {
        const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${folder}?ref=${branch}`;
        const res = await fetch(apiUrl);

        if (!res.ok) {
          throw new Error(`GitHub API error: ${res.status}`);
        }

        const files = await res.json();

        const imageExts = [".jpg", ".jpeg", ".png", ".webp", ".gif", ".bmp", ".svg", ".avif"];
        const images = files.filter(file =>
          file.type === "file" &&
          imageExts.some(ext => file.name.toLowerCase().endsWith(ext))
        );

        if (!images.length) {
          showMessage("No images found in /pics");
          return;
        }

        gallery.innerHTML = "";

        images.forEach(file => {
          const fileUrl = `/${folder}/${encodeURIComponent(file.name)}`;

          const card = document.createElement("div");
          card.className = "card";

          const link = document.createElement("a");
          link.href = fileUrl;
          link.addEventListener("click", function(e) {
            e.preventDefault();
            openLightbox(fileUrl);
          });

          const img = document.createElement("img");
          img.src = fileUrl;
          img.alt = "";

          link.appendChild(img);
          card.appendChild(link);
          gallery.appendChild(card);
        });
      } catch (err) {
        showMessage("Could not load images automatically. Make sure the repo is public, the folder is /pics, and GitHub Pages is serving the main branch.");
        console.error(err);
      }
    }

    loadImages();
  </script>
</body>
</html>
