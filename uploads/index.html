<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Linear IT — File Upload</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen text-gray-900 font-sans">

  <!-- AUTH SCREEN -->
  <div id="authScreen" class="flex items-center justify-center min-h-screen p-4">
    <div class="bg-white rounded-2xl shadow border w-full max-w-sm p-6">
      <img src="https://cftheitguy.github.io/assets/logo.png" alt="Linear IT" class="h-8 mb-6">
      <h1 class="text-xl font-bold mb-1" id="authTitle">Sign in</h1>
      <p class="text-sm text-gray-500 mb-5" id="authSub">Access your files</p>

      <div class="space-y-3">
        <input id="authEmail" type="email" placeholder="Email" class="w-full rounded-lg border px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-black">
        <input id="authPassword" type="password" placeholder="Password" class="w-full rounded-lg border px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-black">
        <button id="authBtn" onclick="doAuth()" class="w-full bg-black text-white rounded-lg py-2 text-sm font-medium hover:bg-gray-800 transition">Sign in</button>
        <p id="authError" class="text-red-500 text-xs text-center hidden"></p>
      </div>

      <p class="text-center text-xs text-gray-400 mt-4">
        <span id="authToggleText">Don't have an account?</span>
        <button id="authToggleBtn" onclick="toggleMode()" class="underline ml-1 text-black">Register</button>
      </p>
    </div>
  </div>

  <!-- APP SCREEN -->
  <div id="appScreen" class="hidden min-h-screen">
    <!-- Nav -->
    <nav class="bg-white border-b px-6 py-3 flex items-center justify-between">
      <img src="https://cftheitguy.github.io/assets/logo.png" alt="Linear IT" class="h-7">
      <div class="flex items-center gap-3">
        <span id="userEmailDisplay" class="text-sm text-gray-500"></span>
        <button onclick="logout()" class="text-sm text-gray-500 hover:text-black underline">Sign out</button>
      </div>
    </nav>

    <main class="max-w-2xl mx-auto p-6 space-y-6">

      <!-- Upload box -->
      <div class="bg-white border-2 border-dashed border-gray-300 rounded-2xl p-8 text-center hover:border-black transition cursor-pointer" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <div class="text-4xl mb-2">&#8679;</div>
        <p class="font-medium">Click or drag files here to upload</p>
        <p class="text-sm text-gray-400 mt-1">Any file type accepted</p>
        <input type="file" id="fileInput" class="hidden" multiple onchange="uploadFiles(this.files)">
      </div>

      <!-- Upload progress -->
      <div id="uploadStatus" class="hidden bg-blue-50 border border-blue-200 rounded-xl px-4 py-3 text-sm text-blue-700"></div>

      <!-- Files list -->
      <div>
        <h2 class="font-semibold text-lg mb-3">Your Files</h2>
        <div id="fileList" class="space-y-2">
          <p class="text-sm text-gray-400">Loading...</p>
        </div>
      </div>
    </main>
  </div>

  <script>
    const API = "https://uploads-api.friedmanchaimhersh.workers.dev";
    let mode = "login";
    let token = localStorage.getItem("uploads_token");
    let userEmail = localStorage.getItem("uploads_email");

    // Drag and drop
    const dropZone = document.getElementById("dropZone");
    dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("border-black"); });
    dropZone.addEventListener("dragleave", () => dropZone.classList.remove("border-black"));
    dropZone.addEventListener("drop", e => { e.preventDefault(); dropZone.classList.remove("border-black"); uploadFiles(e.dataTransfer.files); });

    function toggleMode() {
      mode = mode === "login" ? "register" : "login";
      document.getElementById("authTitle").textContent = mode === "login" ? "Sign in" : "Create account";
      document.getElementById("authSub").textContent = mode === "login" ? "Access your files" : "Set up your account";
      document.getElementById("authBtn").textContent = mode === "login" ? "Sign in" : "Register";
      document.getElementById("authToggleText").textContent = mode === "login" ? "Don't have an account?" : "Already have an account?";
      document.getElementById("authToggleBtn").textContent = mode === "login" ? "Register" : "Sign in";
      document.getElementById("authError").classList.add("hidden");
    }

    async function doAuth() {
      const email = document.getElementById("authEmail").value.trim();
      const password = document.getElementById("authPassword").value;
      const errEl = document.getElementById("authError");
      errEl.classList.add("hidden");

      if (!email || !password) { showErr("Fill in all fields."); return; }

      const res = await fetch(`${API}/${mode === "login" ? "login" : "register"}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();

      if (!res.ok) { showErr(data.error || "Something went wrong."); return; }

      if (mode === "register") {
        // Auto-login after register
        const res2 = await fetch(`${API}/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });
        const data2 = await res2.json();
        if (!res2.ok) { showErr(data2.error || "Registered but login failed."); return; }
        saveSession(data2.token, email);
      } else {
        saveSession(data.token, email);
      }
    }

    function showErr(msg) {
      const el = document.getElementById("authError");
      el.textContent = msg;
      el.classList.remove("hidden");
    }

    function saveSession(t, email) {
      token = t;
      userEmail = email;
      localStorage.setItem("uploads_token", t);
      localStorage.setItem("uploads_email", email);
      showApp();
    }

    function logout() {
      localStorage.removeItem("uploads_token");
      localStorage.removeItem("uploads_email");
      token = null;
      document.getElementById("authScreen").classList.remove("hidden");
      document.getElementById("appScreen").classList.add("hidden");
    }

    function showApp() {
      document.getElementById("authScreen").classList.add("hidden");
      document.getElementById("appScreen").classList.remove("hidden");
      document.getElementById("userEmailDisplay").textContent = userEmail;
      loadFiles();
    }

    async function loadFiles() {
      const res = await fetch(`${API}/files`, { headers: { Authorization: `Bearer ${token}` } });
      if (res.status === 401) { logout(); return; }
      const files = await res.json();
      const el = document.getElementById("fileList");
      if (!files.length) { el.innerHTML = '<p class="text-sm text-gray-400">No files uploaded yet.</p>'; return; }
      el.innerHTML = files.map(f => `
        <div class="bg-white border rounded-xl px-4 py-3 flex items-center justify-between">
          <div>
            <p class="font-medium text-sm">${escHtml(f.filename)}</p>
            <p class="text-xs text-gray-400">${formatSize(f.size)} &middot; ${formatDate(f.uploaded_at)}</p>
          </div>
          <a href="${API}/file/${f.id}"
             onclick="event.preventDefault(); downloadFile('${f.id}', '${escHtml(f.filename)}')"
             class="text-sm text-black underline hover:text-gray-600">Download</a>
        </div>
      `).join("");
    }

    async function downloadFile(id, filename) {
      const res = await fetch(`${API}/file/${id}`, { headers: { Authorization: `Bearer ${token}` } });
      if (!res.ok) { alert("Download failed."); return; }
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = filename; a.click();
      URL.revokeObjectURL(url);
    }

    async function uploadFiles(files) {
      if (!files.length) return;
      const status = document.getElementById("uploadStatus");
      status.classList.remove("hidden");
      for (const file of files) {
        status.textContent = `Uploading ${file.name}...`;
        const fd = new FormData();
        fd.append("file", file);
        const res = await fetch(`${API}/upload`, {
          method: "POST",
          headers: { Authorization: `Bearer ${token}` },
          body: fd
        });
        if (res.status === 401) { logout(); return; }
        if (!res.ok) { status.textContent = `Failed to upload ${file.name}.`; continue; }
      }
      status.textContent = `Done! ${files.length} file(s) uploaded.`;
      setTimeout(() => status.classList.add("hidden"), 3000);
      loadFiles();
    }

    function formatSize(bytes) {
      if (!bytes) return "—";
      if (bytes < 1024) return bytes + " B";
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
      return (bytes / 1024 / 1024).toFixed(1) + " MB";
    }

    function formatDate(str) {
      if (!str) return "";
      return new Date(str).toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
    }

    function escHtml(s) {
      return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    // Auto-login if token exists
    if (token) showApp();
  </script>
</body>
</html>
