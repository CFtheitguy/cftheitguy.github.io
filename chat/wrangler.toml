# Cloudflare Worker config for Linear Chat (chat.linearit.co)
# ----------------------------------------------------------
# This lets the `linear-chat` Worker deploy automatically from this repo via
# Cloudflare "Workers Builds" (Settings -> Build -> Connect to Git). After the
# one-time setup, every `git push` deploys — no more copy/paste.
#
# ⚠️  READ chat/DEPLOY-GIT.md BEFORE CONNECTING GIT. Two must-dos:
#   1) Fill in database_id below (Cloudflare -> Storage & Databases -> D1 ->
#      linear_chat -> copy the "Database ID").
#   2) Make AUTH_SECRET, RESEND_API_KEY, ADMIN_EMAILS, EMAIL_FROM into
#      *encrypted Secrets* on the Worker (not plaintext variables). Secrets
#      survive Git deploys; plaintext vars that aren't listed here get wiped.
#
# Secrets are intentionally NOT in this file — it lives in a public repo.

name = "linear-chat"
main = "src/index.js"
compatibility_date = "2025-06-01"

# In Workers Builds, set the build "Root directory" to `chat` so that `main`
# (src/index.js) and this file resolve correctly. No build command is needed —
# the Worker is a single ES module, so the default `wrangler deploy` bundles it.

# --- D1 database (chat data: users, groups, messages, reactions) ---
[[d1_databases]]
binding = "DB"
database_name = "linear_chat"
database_id = "201d9672-d0c5-48e8-b275-67cbeb6b93cc"

# --- R2 bucket (file attachments). Match the bucket name you created. ---
[[r2_buckets]]
binding = "FILES"
bucket_name = "linear-chat-files"

# --- Non-secret variables (optional) ---
# The code already defaults JITSI_DOMAIN to meet.jit.si and MAX_UPLOAD_MB to 20,
# so these are optional. AUTH_SECRET / RESEND_API_KEY / ADMIN_EMAILS / EMAIL_FROM
# are deliberately NOT here — keep them as encrypted Secrets in the dashboard.
# [vars]
# JITSI_DOMAIN = "meet.jit.si"
# MAX_UPLOAD_MB = "20"
