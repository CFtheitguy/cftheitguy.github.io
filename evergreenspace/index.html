<body>
<div class="bg-floaters">
  <span class="floater f1"></span>
  <span class="floater f2"></span>
  <span class="floater f3"></span>
  <span class="floater f4"></span>
</div>

<!-- Portal Content ONLY -->
<div id="contentBox" class="content-box">
  <div class="header-box">
    <h1>Welcome to Your Portal! 👋</h1>
    <p style="margin: 5px 0 0 0; opacity: 0.9;">
      Access your invoices, tickets, and documents
    </p>
  </div>

  <!-- Invoices -->
  <div class="folder" id="invoicesFolder">
    <div class="folder-header" onclick="toggleFolder('invoicesFolder')">
      <div class="folder-title">
        <span class="folder-icon">📄</span>
        <span>Invoices</span>
      </div>
      <span class="folder-arrow">▶</span>
    </div>
    <div class="folder-content" id="invoicesList"></div>
  </div>

  <!-- Tickets -->
  <div class="folder" id="ticketsFolder">
    <div class="folder-header" onclick="toggleFolder('ticketsFolder')">
      <div class="folder-title">
        <span class="folder-icon">🎫</span>
        <span>Support Tickets</span>
      </div>
      <span class="folder-arrow">▶</span>
    </div>
    <div class="folder-content" id="ticketsList"></div>
  </div>

  <!-- Documents -->
  <div class="folder" id="documentsFolder">
    <div class="folder-header" onclick="toggleFolder('documentsFolder')">
      <div class="folder-title">
        <span class="folder-icon">📁</span>
        <span>Documents</span>
      </div>
      <span class="folder-arrow">▶</span>
    </div>
    <div class="folder-content" id="documentsList"></div>
  </div>
</div>

<script>
// ========================================
// DATA
// ========================================
let invoices = [];

const tickets = [
  "Invoice_0445_2026-01-12.pdf"
];

const documents = [
  "Invoice_0445_2026-01-12.pdf"
];

// ========================================
// LOAD INVOICES
// ========================================
async function loadInvoiceFiles() {
  try {
    const res = await fetch("assets/invoices/invoices.json", { cache: "no-store" });

    if (!res.ok) {
      invoices = [];
      return;
    }

    const data = await res.json();

    invoices = Array.isArray(data)
      ? data.filter(x => typeof x === "string" && x.toLowerCase().endsWith(".pdf"))
      : [];

  } catch (err) {
    console.error("Could not load invoices.json", err);
    invoices = [];
  }
}

// ========================================
// LOAD FILES INTO UI
// ========================================
function loadFiles() {
  const invoicesList = document.getElementById('invoicesList');

  if (!invoices.length) {
    invoicesList.innerHTML = '<div class="empty-folder">No invoices available</div>';
  } else {
    const sorted = [...invoices].sort().reverse();
    invoicesList.innerHTML = sorted.map(f => createFileItem(f, 'invoices')).join('');
  }

  const ticketsList = document.getElementById('ticketsList');
  ticketsList.innerHTML = tickets.length
    ? tickets.map(f => createFileItem(f, 'tickets')).join('')
    : '<div class="empty-folder">No tickets available</div>';

  const documentsList = document.getElementById('documentsList');
  documentsList.innerHTML = documents.length
    ? documents.map(f => createFileItem(f, 'documents')).join('')
    : '<div class="empty-folder">No documents available</div>';
}

// ========================================
// HELPERS
// ========================================
function escapeHtml(str) {
  return str
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function createFileItem(filename, folder) {
  const safe = escapeHtml(filename);
  const path = `assets/${folder}/${filename}`;

  const display = filename
    .replace(/\.pdf$/i, '')
    .replace(/[-_]/g, ' ')
    .trim();

  return `
    <div class="file-item">
      <div class="file-info">
        <div class="file-name">${display}</div>
      </div>
      <div class="file-actions">
        <a href="${path}" class="btn-view" target="_blank">View</a>
        <a href="${path}" class="btn-download" download>Download</a>
      </div>
    </div>
  `;
}

// ========================================
// UI
// ========================================
function toggleFolder(id) {
  document.getElementById(id).classList.toggle('open');
}

// ========================================
// INIT
// ========================================
loadInvoiceFiles().then(loadFiles);
</script>
</body>
