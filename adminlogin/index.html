<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Linear IT — Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen text-gray-900 font-sans">

  <!-- LOGIN SCREEN -->
  <div id="loginScreen" class="flex items-center justify-center min-h-screen p-4">
    <div class="bg-white rounded-2xl shadow border w-full max-w-sm p-6">
      <img src="https://cftheitguy.github.io/assets/logo.png" alt="Linear IT" class="h-8 mb-6">
      <h1 class="text-xl font-bold mb-1">Admin Login</h1>
      <p class="text-sm text-gray-500 mb-5">Linear IT internal use only</p>
      <div class="space-y-3">
        <input id="secretInput" type="password" placeholder="Admin secret" class="w-full rounded-lg border px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-black">
        <button onclick="doLogin()" class="w-full bg-black text-white rounded-lg py-2 text-sm font-medium hover:bg-gray-800 transition">Enter</button>
        <p id="loginError" class="text-red-500 text-xs text-center hidden"></p>
      </div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="hidden min-h-screen">
    <nav class="bg-white border-b px-6 py-3 flex items-center justify-between">
      <img src="https://cftheitguy.github.io/assets/logo.png" alt="Linear IT" class="h-7">
      <div class="flex items-center gap-3">
        <span class="text-xs bg-gray-100 rounded-full px-3 py-1 font-medium">Admin</span>
        <button onclick="adminLogout()" class="text-sm text-gray-500 hover:text-black underline">Sign out</button>
      </div>
    </nav>

    <main class="max-w-5xl mx-auto p-6 space-y-4">
      <div class="flex items-center justify-between">
        <h1 class="text-xl font-bold">All Uploads</h1>
        <button onclick="loadUploads()" class="text-sm text-gray-500 hover:text-black underline">Refresh</button>
      </div>

      <!-- Stats -->
      <div class="grid grid-cols-3 gap-4">
        <div class="bg-white border rounded-xl p-4">
          <p class="text-xs text-gray-400 uppercase tracking-wide">Total Files</p>
          <p id="statFiles" class="text-2xl font-bold mt-1">—</p>
        </div>
        <div class="bg-white border rounded-xl p-4">
          <p class="text-xs text-gray-400 uppercase tracking-wide">Total Size</p>
          <p id="statSize" class="text-2xl font-bold mt-1">—</p>
        </div>
        <div class="bg-white border rounded-xl p-4">
          <p class="text-xs text-gray-400 uppercase tracking-wide">Unique Users</p>
          <p id="statUsers" class="text-2xl font-bold mt-1">—</p>
        </div>
      </div>

      <!-- Search / Filter -->
      <div class="flex gap-3">
        <input id="searchInput" oninput="filterTable()" placeholder="Search by name or email..." class="flex-1 rounded-lg border px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-black">
      </div>

      <!-- Table -->
      <div class="bg-white border rounded-2xl overflow-hidden">
        <table class="w-full text-sm">
          <thead class="bg-gray-50 border-b">
            <tr>
              <th class="text-left px-4 py-3 font-medium text-gray-500">File</th>
              <th class="text-left px-4 py-3 font-medium text-gray-500">Uploaded by</th>
              <th class="text-left px-4 py-3 font-medium text-gray-500">Size</th>
              <th class="text-left px-4 py-3 font-medium text-gray-500">Date</th>
              <th class="px-4 py-3"></th>
            </tr>
          </thead>
          <tbody id="uploadsTable">
            <tr><td colspan="5" class="px-4 py-6 text-center text-gray-400">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script>
    const API = "https://uploads-api.friedmanchaimhersh.workers.dev";
    let adminSecret = localStorage.getItem("admin_secret");
    let allUploads = [];

    async function doLogin() {
      const secret = document.getElementById("secretInput").value.trim();
      if (!secret) return;
      // Test the secret against the API
      const res = await fetch(`${API}/admin/uploads`, {
        headers: { Authorization: `Bearer ${secret}` }
      });
      if (!res.ok) {
        document.getElementById("loginError").textContent = "Invalid secret.";
        document.getElementById("loginError").classList.remove("hidden");
        return;
      }
      adminSecret = secret;
      localStorage.setItem("admin_secret", secret);
      showDashboard(await res.json());
    }

    function adminLogout() {
      localStorage.removeItem("admin_secret");
      adminSecret = null;
      document.getElementById("loginScreen").classList.remove("hidden");
      document.getElementById("dashboard").classList.add("hidden");
    }

    async function loadUploads() {
      const res = await fetch(`${API}/admin/uploads`, {
        headers: { Authorization: `Bearer ${adminSecret}` }
      });
      if (res.status === 403) { adminLogout(); return; }
      showDashboard(await res.json());
    }

    function showDashboard(uploads) {
      allUploads = uploads;
      document.getElementById("loginScreen").classList.add("hidden");
      document.getElementById("dashboard").classList.remove("hidden");
      renderTable(uploads);
      renderStats(uploads);
    }

    function renderStats(uploads) {
      document.getElementById("statFiles").textContent = uploads.length;
      const totalBytes = uploads.reduce((s, f) => s + (f.size || 0), 0);
      document.getElementById("statSize").textContent = formatSize(totalBytes);
      const uniqueUsers = new Set(uploads.map(f => f.email)).size;
      document.getElementById("statUsers").textContent = uniqueUsers;
    }

    function renderTable(uploads) {
      const tbody = document.getElementById("uploadsTable");
      if (!uploads.length) {
        tbody.innerHTML = '<tr><td colspan="5" class="px-4 py-6 text-center text-gray-400">No uploads yet.</td></tr>';
        return;
      }
      tbody.innerHTML = uploads.map(f => `
        <tr class="border-t hover:bg-gray-50">
          <td class="px-4 py-3 font-medium max-w-xs truncate">${escHtml(f.filename)}</td>
          <td class="px-4 py-3 text-gray-500">${escHtml(f.email)}</td>
          <td class="px-4 py-3 text-gray-500">${formatSize(f.size)}</td>
          <td class="px-4 py-3 text-gray-500">${formatDate(f.uploaded_at)}</td>
          <td class="px-4 py-3 text-right">
            <button onclick="adminDownload('${f.id}','${escHtml(f.filename)}')" class="text-black underline text-sm hover:text-gray-600">Download</button>
          </td>
        </tr>
      `).join("");
    }

    function filterTable() {
      const q = document.getElementById("searchInput").value.toLowerCase();
      const filtered = allUploads.filter(f =>
        f.filename.toLowerCase().includes(q) || f.email.toLowerCase().includes(q)
      );
      renderTable(filtered);
    }

    async function adminDownload(id, filename) {
      const res = await fetch(`${API}/admin/file/${id}`, {
        headers: { Authorization: `Bearer ${adminSecret}` }
      });
      if (!res.ok) { alert("Download failed."); return; }
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = filename; a.click();
      URL.revokeObjectURL(url);
    }

    function formatSize(bytes) {
      if (!bytes) return "—";
      if (bytes < 1024) return bytes + " B";
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
      return (bytes / 1024 / 1024).toFixed(1) + " MB";
    }

    function formatDate(str) {
      if (!str) return "";
      return new Date(str).toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric", hour: "2-digit", minute: "2-digit" });
    }

    function escHtml(s) {
      return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    // Auto-login if secret cached
    if (adminSecret) loadUploads();
  </script>
</body>
</html>
